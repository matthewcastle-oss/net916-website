
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Fun2Phish</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Fun2Phish</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="employees.html">Team</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="/intranet/index.html" class="intranet">Employee Intranet ↗</a>
  </div>
</nav>

<div class="page">
  <div class="container">

    <div class="page-header fade-up">
      <p class="section-label">Get In Touch</p>
      <h1>Let's talk security.</h1>
      <p>Have a question or want to learn more about what we do? Send us a message.</p>
    </div>

    <div class="contact-form fade-up delay-1">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="First name" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Last name" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone <span style="opacity:0.5;font-weight:400;">(optional)</span></label>
          <input type="tel" id="phone" placeholder="555-555-5555">
        </div>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="What's this about?" required>
      </div>
      <div class="form-group">
        <label for="body">Message</label>
        <textarea id="body" placeholder="Tell us what you need..."></textarea>
      </div>
      <button onclick="submitInquiry()">Send Message →</button>
      <div id="statusOk" style="display:none; margin-top:1rem; background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); color:#10b981; border-radius:8px; padding:0.75rem 1rem; font-size:0.875rem;">
        ✓ Message sent! We'll get back to you soon.
      </div>
      <div id="statusErr" style="display:none; margin-top:1rem; background:rgba(244,63,94,0.1); border:1px solid rgba(244,63,94,0.3); color:#f43f5e; border-radius:8px; padding:0.75rem 1rem; font-size:0.875rem;"></div>
    </div>

    <script>
    async function submitInquiry() {
      const ok  = document.getElementById('statusOk');
      const err = document.getElementById('statusErr');
      ok.style.display = 'none';
      err.style.display = 'none';

      const data = {
        firstName: document.getElementById('firstName').value.trim(),
        lastName:  document.getElementById('lastName').value.trim(),
        email:     document.getElementById('email').value.trim(),
        phone:     document.getElementById('phone').value.trim(),
        subject:   document.getElementById('subject').value.trim(),
        body:      document.getElementById('body').value.trim(),
      };

      if (!data.firstName || !data.lastName || !data.email || !data.subject || !data.body) {
        err.textContent = 'Please fill in all required fields.';
        err.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/inquiry', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const text = await res.text();
        if (res.ok) {
          ok.style.display = 'block';
          document.getElementById('firstName').value = '';
          document.getElementById('lastName').value  = '';
          document.getElementById('email').value     = '';
          document.getElementById('phone').value     = '';
          document.getElementById('subject').value   = '';
          document.getElementById('body').value      = '';
        } else {
          err.textContent = text || 'Something went wrong. Please try again.';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Could not reach the server. Please try again later.';
        err.style.display = 'block';
      }
    }
    </script>

  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-brand">⟁ Fun2Phish</span>
      <span class="footer-text">© 2025 Fun2Phish. All rights reserved.</span>
    </div>
  </footer>
</div>

</body>
</html>
