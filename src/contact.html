<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Fun2Phish</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Fun2Phish</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="employees.html">Team</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="/intranet/index.html" class="intranet">Employee Intranet ↗</a>
  </div>
</nav>

<div class="page">
  <div class="container">

    <div class="page-header fade-up">
      <p class="section-label">Get In Touch</p>
      <h1>Let's talk security.</h1>
      <p>Have a question or want to learn more about what we do? Send us a message.</p>
    </div>

    <div class="contact-form fade-up delay-1">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com">
        </div>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Tell us what you need..."></textarea>
      </div>
      <button type="submit">Send Message →</button>
    </div>

  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-brand">⟁ Fun2Phish</span>
      <span class="footer-text">© 2025 Fun2Phish. All rights reserved.</span>
    </div>
  </footer>
</div>

</body>
</html>
