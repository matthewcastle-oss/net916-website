<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Time Off</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container">

<h1>Time Off Request</h1>

<nav>
  <a href="/intranet/index.html">Intranet Home</a>
  <a href="/">Public Site</a>
</nav>

<hr>

<form id="timeoffForm">

<label>Email</label>
<input name="employeeEmail" type="email" required>

<label>Start Date</label>
<input name="startDate" type="date" required>

<label>End Date</label>
<input name="endDate" type="date" required>

<label>Reason</label>
<textarea name="reason" required></textarea>

<button type="submit">Submit</button>

</form>

<p id="status"></p>

<script>
document.getElementById("timeoffForm").addEventListener("submit", async e => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch("/api/timeoff/submit", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  document.getElementById("status").innerText = await res.text();
});
</script>

</div>

</body>
</html>
