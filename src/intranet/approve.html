<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Approve Requests</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="container">

<h1>Approve Requests</h1>

<nav>
  <a href="/intranet/index.html">Intranet Home</a>
  <a href="/">Public Site</a>
</nav>

<hr>

<form id="decisionForm">

<label>Request ID</label>
<input name="requestId" type="number" required>

<label>Status</label>
<select name="status">
  <option>Approved</option>
  <option>Denied</option>
</select>

<label>Note</label>
<textarea name="managerNote"></textarea>

<button type="submit">Submit</button>

</form>

<p id="status"></p>

<script>
document.getElementById("decisionForm").addEventListener("submit", async e => {
  e.preventDefault();

  const data = Object.fromEntries(new FormData(e.target));

  const res = await fetch("/api/timeoff/decision", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  document.getElementById("status").innerText = await res.text();
});
</script>

</div>

</body>
</html>
