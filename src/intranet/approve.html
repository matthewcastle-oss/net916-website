<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approve Requests — Fun2Phish</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(244,63,94,0.3);
      color: #f43f5e;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      box-shadow: none;
    }
    .logout-btn:hover {
      background: rgba(244,63,94,0.1);
      box-shadow: none;
      transform: none;
    }
    .status-ok {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      color: #10b981;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }
    .status-err {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      color: #f43f5e;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      margin-top: 1rem;
      display: none;
    }
    .approve-select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    .approve-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
    }
  </style>
</head>
<body>
<script src="/intranet/auth.js"></script>

<nav>
  <a href="/" class="nav-logo">Fun2Phish</a>
  <div class="nav-links" style="display:flex; align-items:center; gap:0.5rem;">
    <a href="/intranet/index.html">Intranet</a>
    <a href="/intranet/timeoff.html">Time Off</a>
    <a href="/intranet/approve.html" style="color:var(--accent)">Approve</a>
    <a href="/">Public Site</a>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="container">

    <div class="page-header fade-up">
      <p class="section-label">🔒 Secured Area</p>
      <h1>Approve Requests</h1>
      <p>Review and action pending employee time off requests.</p>
    </div>

    <div class="contact-form fade-up delay-1">
      <div class="form-group">
        <label for="requestId">Request ID</label>
        <input type="number" id="requestId" placeholder="Enter request ID" required>
      </div>
      <div class="form-group">
        <label for="status">Decision</label>
        <select id="status" class="approve-select">
          <option value="Approved">✓ Approved</option>
          <option value="Denied">✗ Denied</option>
        </select>
      </div>
      <div class="form-group">
        <label for="managerNote">Manager Note</label>
        <textarea id="managerNote" placeholder="Optional note to the employee..."></textarea>
      </div>
      <button onclick="submitDecision()">Submit Decision →</button>
      <div class="status-ok" id="statusOk">✓ Decision submitted successfully!</div>
      <div class="status-err" id="statusErr"></div>
    </div>

  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-brand">⟁ Fun2Phish Intranet</span>
      <span class="footer-text">Restricted — Authorized Personnel Only</span>
    </div>
  </footer>
</div>

<script>
async function submitDecision() {
  const data = {
    requestId: document.getElementById('requestId').value,
    status: document.getElementById('status').value,
    managerNote: document.getElementById('managerNote').value,
  };
  const ok = document.getElementById('statusOk');
  const err = document.getElementById('statusErr');
  ok.style.display = 'none';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/timeoff/decision', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const text = await res.text();
    if (res.ok) {
      ok.style.display = 'block';
    } else {
      err.textContent = text || 'Something went wrong.';
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = 'Could not reach the server.';
    err.style.display = 'block';
  }
}
</script>

</body>
</html>
